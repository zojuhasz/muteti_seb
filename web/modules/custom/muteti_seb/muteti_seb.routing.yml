muteti_seb.booking:
  path: '/muteti/elojegyzes'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\BookingController::week'
    _title: 'Előjegyzés'
  requirements:
    _permission: 'view surgery schedule'

muteti_seb.appointment:
  path: '/muteti/elojegyzes/{date}/{slot}'
  defaults:
    _form: '\Drupal\muteti_seb\Form\AppointmentForm'
    _title: 'Beteg felvitele'
  requirements:
    _permission: 'create surgery appointment'
    date: '\d{4}-\d{2}-\d{2}'

muteti_seb.surgery:
  path: '/muteti/muteti-beosztas'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\SurgeryController::week'
    _title: 'Műtéti beosztás'
  requirements:
    _permission: 'view surgery schedule'
    _custom_access: '\Drupal\muteti_seb\Controller\SurgeryController::access'

muteti_seb.assignment:
  path: '/muteti/api/assignment'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AssignmentController::update'
  methods: [POST]
  requirements:
    _permission: 'assign operating room'
    _csrf_token: 'TRUE'

muteti_seb.day_type:
  path: '/muteti/api/day-type'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\DayTypeController::update'
  methods: [POST]
  requirements:
    _permission: 'assign operating room'
    _csrf_token: 'TRUE'

muteti_seb.appointment_move:
  path: '/muteti/api/appointment-move'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AppointmentMoveController::move'
  methods: [POST]
  requirements:
    _permission: 'edit surgery appointment'
    _csrf_token: 'TRUE'

muteti_seb.appointment_delete:
  path: '/muteti/api/appointment-delete'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AppointmentMoveController::delete'
  methods: [POST]
  requirements:
    _permission: 'edit surgery appointment'
    _csrf_token: 'TRUE'

muteti_seb.program_pdf:
  path: '/muteti/program/{date}/pdf'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\ProgramPdfController::pdf'
    _title: 'Műtéti program PDF'
  requirements:
    _permission: 'view surgery schedule'
    date: '\d{4}-\d{2}-\d{2}'

muteti_seb.oncology_booking_pdf:
  path: '/muteti/onkologia/elojegyzes/{date}/pdf'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\ProgramPdfController::oncologyBookingPdf'
    _title: 'Onkológiai kezelési lista PDF'
  requirements:
    _permission: 'view surgery schedule'
    _custom_access: '\Drupal\muteti_seb\Controller\ProgramPdfController::oncologyAccess'
    date: '\d{4}-\d{2}-\d{2}'

muteti_seb.departments:
  path: '/admin/content/muteti-osztalyok'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\DepartmentController::listing'
    _title: 'Műtéti osztályok'
  requirements:
    _custom_access: '\Drupal\muteti_seb\Controller\DepartmentController::adminAccess'

muteti_seb.department_add:
  path: '/admin/content/muteti-osztalyok/uj'
  defaults:
    _form: '\Drupal\muteti_seb\Form\DepartmentForm'
    _title: 'Új osztály'
  requirements:
    _custom_access: '\Drupal\muteti_seb\Controller\DepartmentController::adminAccess'

muteti_seb.department_edit:
  path: '/admin/content/muteti-osztalyok/{department}'
  defaults:
    _form: '\Drupal\muteti_seb\Form\DepartmentForm'
    _title: 'Osztály módosítása'
  requirements:
    _custom_access: '\Drupal\muteti_seb\Controller\DepartmentController::adminAccess'
    department: '\d+'

muteti_seb.audit_log:
  path: '/admin/reports/muteti-naplo'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AuditLogController::listing'
    _title: 'Műtéti előjegyzési napló'
  requirements:
    _custom_access: '\Drupal\muteti_seb\Controller\AuditLogController::access'

muteti_seb.doctor_content:
  path: '/admin/content/muteti-orvosok'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\DoctorNodeController::listing'
    _title: 'Orvosok'
  requirements:
    _permission: 'administer surgery system'

muteti_seb.availability_update:
  path: '/muteti/api/tavollet'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AvailabilityController::update'
  methods: [POST]
  requirements:
    _permission: 'manage own doctor availability'
    _csrf_token: 'TRUE'

muteti_seb.availability_month:
  path: '/muteti/szabadsagok'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AvailabilityController::month'
    _title: 'Szabadságok'
  requirements:
    _permission: 'view doctor availability'
    _custom_access: '\Drupal\muteti_seb\Controller\AvailabilityController::availabilityAccess'

muteti_seb.availability_pdf:
  path: '/muteti/szabadsagok/{month}/pdf'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AvailabilityController::pdf'
    _title: 'Havi szabadságlista PDF'
  requirements:
    _permission: 'view doctor availability'
    _custom_access: '\Drupal\muteti_seb\Controller\AvailabilityController::availabilityAccess'
    month: '\d{4}-\d{2}'

muteti_seb.away_month:
  path: '/muteti/idegenben'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AvailabilityController::awayMonth'
    _title: 'Idegenben'
  requirements:
    _permission: 'view doctor availability'
    _custom_access: '\Drupal\muteti_seb\Controller\AvailabilityController::awayAccess'

muteti_seb.away_pdf:
  path: '/muteti/idegenben/{month}/pdf'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\AvailabilityController::awayPdf'
    _title: 'Havi idegenben lista PDF'
  requirements:
    _permission: 'view doctor availability'
    _custom_access: '\Drupal\muteti_seb\Controller\AvailabilityController::awayAccess'
    month: '\d{4}-\d{2}'

muteti_seb.patient_search:
  path: '/muteti/betegkereso'
  defaults:
    _controller: '\Drupal\muteti_seb\Controller\PatientSearchController::search'
    _title: 'Betegkereső'
  requirements:
    _permission: 'manage own doctor availability'
